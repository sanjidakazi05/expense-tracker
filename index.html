<link rel="stylesheet" href="styles.css">

<h1>Personal Expense Tracker 🗒️</h1>

<form id="expense-form">
    <input type="text" id="description" placeholder="Description">

    <input type="number" id="amount" placeholder="Amount" min="0">

    <select id="category">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
    </select>

    <input type="date" id="date">

    <button type="submit">Add Expense</button>
</form>

<p id="error"></p>

<div class="controls">
    <select id="filter">
        <option value="All">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
    </select>

    <select id="sort">
        <option value="dateAsc">Date ↑</option>
        <option value="dateDesc">Date ↓</option>
        <option value="amountAsc">Amount ↑</option>
        <option value="amountDesc">Amount ↓</option>
    </select>
</div>

<div class="totals">
    <h3>Total: <span id="total">$0.00</span></h3>
    <button id="convert-btn">Convert to EUR</button>
    <p id="eur-total"></p>

    <p>Expense Count: <span id="count">0</span></p>

    <ul id="category-totals"></ul>
</div>

<div id="expense-list"></div>

<script src="script.js"></script>
